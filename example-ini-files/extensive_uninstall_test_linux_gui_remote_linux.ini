## Extensive uninstall profile paired with:
## extensive_functionality_test_linux_gui_remote_linux.ini
## Removes remote test artifacts/services from a Linux host over SSH.

[STARTUP]
usegui = True
logoimg = example-ini-files/tarpon_installer_image.png
iconpng = assets/icons/tarpon_installer_image.png
iconico = assets/icons/tarpon_installer.ico
installtitle = Tarpon Installer Extensive Uninstall (Linux GUI -> Remote Linux)
startupinfo = "Remote uninstall of services, files, and test artifacts created by the extensive remote installer"
buttontext = Run Remote Linux Uninstall
watchdog = False
process_timeout = 180
adminrights = False
themename = litera
displayfinalerrors = True
continuewitherrors = False
usediagnostics = False

[USERINFO]
username = kcarr
password = leopold

[SERVERCONFIG]
host = 172.16.20.106

[BUILD]
buildtype = LINUX
installtype = REMOTELINUX
resources = example-ini-files/resources

[USERINPUT]
customer_name = Enter customer shortname || acme
environment = Enter environment (dev, qa, prod) || qa

[VARIABLES]
remote_stage = /tmp/tarpon_installer_extensive_remote
activemq_version = 5.18.7

[OPTIONS]
option_remove_remote_stage = DEFAULTCHECKED::Remove remote /tmp staging workspace
option_remove_reporttool_path = DEFAULTCHECKED::Remove /opt/tarpontest/ReportTool-test path
option_remove_activemq_install = DEFAULTCHECKED::Remove /opt/activemq install path
option_remove_bundled_java = DEFAULTCHECKED::Remove bundled Java install (/opt/java and /usr/local/bin/java symlink)
option_remove_postgresql_data = Remove /var/lib/pgsql/data contents
option_remove_installed_packages = Remove installed httpd/postgresql packages with dnf

[REPO]

[RPM]
#RPMS START HERE
#RPMS END HERE

[FILES]
#BUILDS START HERE
#BUILDS END HERE

[ACTIONS]
action_confirm_uninstall = YESNO::Proceed with remote uninstall on %host%?::IFGOTO::sh -c 'exit 0'::action_stop_services
action_cancel_uninstall = sh -c 'echo "Uninstall canceled by user"; exit 1'

action_stop_services = sudo sh -c 'systemctl stop httpd postgresql activemq 2>/dev/null || true'
action_disable_services = sudo sh -c 'systemctl disable httpd postgresql activemq 2>/dev/null || true'
action_remove_activemq_unit = sudo sh -c 'rm -f /etc/systemd/system/activemq.service && systemctl daemon-reload'

option_remove_reporttool_path = sudo rm -rf /opt/tarpontest/ReportTool-test
option_remove_activemq_install = sudo rm -rf /opt/activemq
option_remove_bundled_java = sudo sh -c 'rm -rf /opt/java; if [ -L /usr/local/bin/java ]; then rm -f /usr/local/bin/java; fi'
option_remove_remote_stage = rm -rf %remote_stage%/%customer_name%/%environment% %remote_stage%/externalprograms
option_remove_postgresql_data = sudo rm -rf /var/lib/pgsql/data

option_remove_installed_packages = sudo sh -c 'if command -v dnf >/dev/null 2>&1; then dnf remove -y httpd httpd-core httpd-filesystem httpd-tools mod_ssl rocky-logos-httpd postgresql postgresql-server postgresql-contrib postgresql-private-libs libpq uuid mailcap || true; fi'

[MODIFY]
# Intentionally empty for uninstall profile.

[FINAL]
final_httpd_status = sudo systemctl status httpd --no-pager -l || true
final_postgresql_status = sudo systemctl status postgresql --no-pager -l || true
final_activemq_status = sudo systemctl status activemq --no-pager -l || true
final_uninstall_summary = MSGBOX::Remote uninstall complete for %customer_name% (%environment%) on %host%

[DIAGNOSTICS]
# Intentionally empty for uninstall profile.
