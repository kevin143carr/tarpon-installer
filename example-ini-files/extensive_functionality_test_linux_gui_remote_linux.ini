## Extensive functional test profile for Tarpon Installer GUI mode on Windows targeting a remote Linux host.
## This file is intentionally non-destructive and writes test artifacts under /tmp on the remote machine.

## STARTUP: GUI behavior, branding, and theme.
[STARTUP]
usegui = True
logoimg = example-ini-files/tarpon_installer_image.png
iconpng = assets/icons/tarpon_installer_image.png
iconico = assets/icons/tarpon_installer.ico
installtitle = Tarpon Installer Extensive Functional Test (Linux GUI -> Remote Linux)
startupinfo = "Comprehensive remote test of SSH login, file copy, actions, modify, and final steps"
buttontext = Run Remote Linux Test
watchdog = False
process_timeout = 180
adminrights = False
themename = litera
displayfinalerrors = True
continuewitherrors = False
usediagnostics = False

## USERINFO: credentials used for SSH remote login.
## Remote installs currently assume the SSH user is preconfigured as a sudoer
## on the target Linux machine before running Tarpon.
[USERINFO]
username = kcarr
password = leopold

## SERVERCONFIG: remote Linux host or IP.
[SERVERCONFIG]
host = 172.16.20.106

## BUILD: remote Linux install from local Windows GUI.
[BUILD]
buildtype = LINUX
installtype = REMOTELINUX
resources = .

## USERINPUT: prompts shown to users (use "prompt || default" for defaults).
[USERINPUT]
operator_name = Enter operator name (e.g., kevin) || kevin
customer_name = Enter customer shortname || acme
environment = Enter environment (dev, qa, prod) || qa
site_code = Enter site code || nyc1
rhelversion = Enter expected RHEL/Rocky version (example: 9.7) || 9.7
install_note = Enter install note || nightly remote run

## VARIABLES: static values used as tokens in actions/files.
[VARIABLES]
remote_stage = /tmp/tarpon_installer_extensive_remote
logname = extensive_remote_test.log
activemq_version = 5.18.7

## OPTIONS: optional actions presented as checkboxes.
[OPTIONS]
option_prepare_workspace = DEFAULTCHECKED::Create remote workspace
option_show_summary = DEFAULTCHECKED::Show completion summary popup
option_extra_message = Show optional extra message

## REPO: no longer supported (kept for compatibility).
[REPO]

## RPM: list RPMs to install for Linux builds.
[RPM]
#RPMS START HERE
installhttpd = httpd-2.4.62-7.el9_7.3.x86_64.rpm
installpostgresql = postgresql-13.23-1.el9_7.x86_64.rpm
#RPMS END HERE

## FILES: files copied from local resources to remote target locations over SFTP.
[FILES]
#BUILDS START HERE
example-ini-files/samplecsvfile.txt = %remote_stage%/%customer_name%/%environment%
example-ini-files/just-an-owl-md.png = %remote_stage%/%customer_name%/%environment%
README.md = %remote_stage%/%customer_name%/%environment%/README_copy.md
example-ini-files/resources/externalprograms/apache-activemq-%activemq_version%-bin.tar.gz = %remote_stage%/externalprograms
#BUILDS END HERE

## ACTIONS: commands executed on the remote Linux host over SSH.
[ACTIONS]
action_check_rhel_major_minor = IFGOTO::sh -c 'current=$(sed -nE "s/.*release[[:space:]]+([0-9]+\\.[0-9]+).*/\\1/p" /etc/redhat-release | head -n1); [ "$current" = "%rhelversion%" ]'::action_version_exact_match
action_check_rhel_major = IFGOTO::sh -c 'current=$(sed -nE "s/.*release[[:space:]]+([0-9]+\\.[0-9]+).*/\\1/p" /etc/redhat-release | head -n1); [ "$(echo "$current" | cut -d. -f1)" = "$(echo "%rhelversion%" | cut -d. -f1)" ]'::action_prompt_continue_major_only
action_version_mismatch_msg = MSGBOX::RHEL/Rocky version mismatch. Expected %rhelversion%. Install will stop.
action_version_mismatch_stop = sh -c 'echo "RHEL/Rocky version mismatch. Expected %rhelversion%"; exit 1'
action_prompt_continue_major_only = YESNO::RHEL/Rocky minor version differs from expected %rhelversion%. Continue anyway?::IFGOTO::sh -c 'exit 0'::action_version_approved
action_user_declined_version = sh -c 'echo "Install canceled due to version mismatch"; exit 1'
action_version_exact_match = echo "RHEL/Rocky version check passed: %rhelversion%"
action_version_approved = echo "Proceeding with install after version check"
option_prepare_workspace = mkdir -p %remote_stage%/%customer_name%/%environment%
action_prepare_external_programs = mkdir -p %remote_stage%/externalprograms
action_enable_httpd_service = sudo systemctl enable httpd
action_start_httpd_service = sudo systemctl restart httpd
action_status_httpd_service = sudo systemctl status httpd --no-pager -l
action_init_postgresql_db = sudo sh -c 'if [ ! -f /var/lib/pgsql/data/PG_VERSION ]; then postgresql-setup --initdb; fi'
action_enable_postgresql_service = sudo systemctl enable postgresql
action_start_postgresql_service = sudo systemctl restart postgresql
action_status_postgresql_service = sudo systemctl status postgresql --no-pager -l
action_extract_activemq = sh -c 'tar -xzf %remote_stage%/externalprograms/apache-activemq-%activemq_version%-bin.tar.gz -C %remote_stage%/externalprograms'
action_create_activemq_account = sudo sh -c 'getent group activemq >/dev/null || groupadd --system activemq; id -u activemq >/dev/null 2>&1 || useradd --system -g activemq -d /opt/activemq -s /sbin/nologin activemq'
action_install_activemq_dir = sudo mkdir -p /opt/activemq
action_copy_activemq_files = sudo sh -c 'rm -rf /opt/activemq/apache-activemq-%activemq_version% && cp -a %remote_stage%/externalprograms/apache-activemq-%activemq_version% /opt/activemq/'
action_link_activemq_current = sudo ln -sfn /opt/activemq/apache-activemq-%activemq_version% /opt/activemq/current
action_fix_activemq_permissions = sudo chown -R activemq:activemq /opt/activemq
action_write_activemq_unit = sudo sh -c 'printf "[Unit]\nDescription=Apache ActiveMQ Broker\nAfter=network.target\n\n[Service]\nType=forking\nUser=activemq\nGroup=activemq\nExecStart=/opt/activemq/current/bin/activemq start\nExecStop=/opt/activemq/current/bin/activemq stop\nRestart=on-failure\nRestartSec=5\n\n[Install]\nWantedBy=multi-user.target\n" > /etc/systemd/system/activemq.service'
action_reload_systemd = sudo systemctl daemon-reload
action_enable_activemq = sudo systemctl enable activemq
action_start_activemq = sudo systemctl restart activemq
action_status_activemq = sudo systemctl status activemq --no-pager -l
action_banner = echo "Starting remote test for operator=%operator_name% customer=%customer_name% env=%environment% host=%host%"
action_seed_file = sh -c 'printf "line1=alpha\nline2=beta\nsite=%site_code%\n" > %remote_stage%/%customer_name%/%environment%/config.txt'
action_log_note = sh -c 'echo "%install_note%" >> %remote_stage%/%customer_name%/%environment%/%logname%'
option_extra_message = MSGBOX::Optional message selected for %customer_name% at %site_code%

## MODIFY: update or append content in remote files.
[MODIFY]
1 = {FILE}%remote_stage%/%customer_name%/%environment%/generated.conf{ADD}customer=%customer_name%||env=%environment%
2 = {FILE}%remote_stage%/%customer_name%/%environment%/config.txt{CHANGE}line2=beta||line2=gamma
3 = {FILE}%remote_stage%/%customer_name%/%environment%/config.txt{ADD}note=%install_note%

## FINAL: commands executed on the remote host after all sections.
[FINAL]
final_remote_listing = ls -la %remote_stage%/%customer_name%/%environment%
option_show_summary = MSGBOX::Remote summary complete for %customer_name% (%environment%) on %host%

## DIAGNOSTICS: optional post-final checks. Not implemented for remote installs yet.
[DIAGNOSTICS]
# Intentionally empty for remote profile.
