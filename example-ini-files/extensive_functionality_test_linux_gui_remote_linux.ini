## Extensive functional test profile for Tarpon Installer GUI mode on Windows targeting a remote Linux host.
## This file is intentionally non-destructive and writes test artifacts under /tmp on the remote machine.

## STARTUP: GUI behavior, branding, and theme.
[STARTUP]
usegui = True
logoimg = example-ini-files/tarpon_installer_image.png
iconpng = assets/icons/tarpon_installer_image.png
iconico = assets/icons/tarpon_installer.ico
installtitle = Tarpon Installer Extensive Functional Test (Linux GUI -> Remote Linux)
startupinfo = "Comprehensive remote test of SSH login, file copy, actions, modify, and final steps"
buttontext = Run Remote Linux Test
watchdog = False
process_timeout = 180
adminrights = False
themename = litera
displayfinalerrors = True
continuewitherrors = False
usediagnostics = False

## USERINFO: credentials used for SSH remote login.
## Remote installs currently assume the SSH user is preconfigured as a sudoer
## on the target Linux machine before running Tarpon.
[USERINFO]
username =
password =

## SERVERCONFIG: remote Linux host or IP.
[SERVERCONFIG]
host =

## BUILD: remote Linux install from local Windows GUI.
[BUILD]
buildtype = LINUX
installtype = REMOTELINUX
resources = .

## USERINPUT: prompts shown to users (use "prompt || default" for defaults).
[USERINPUT]
operator_name = Enter operator name (e.g., kevin) || kevin
customer_name = Enter customer shortname || acme
environment = Enter environment (dev, qa, prod) || qa
site_code = Enter site code || nyc1
install_note = Enter install note || nightly remote run

## VARIABLES: static values used as tokens in actions/files.
[VARIABLES]
remote_stage = /tmp/tarpon_installer_extensive_remote
logname = extensive_remote_test.log

## OPTIONS: optional actions presented as checkboxes.
[OPTIONS]
option_prepare_workspace = DEFAULTCHECKED::Create remote workspace
option_show_summary = DEFAULTCHECKED::Show completion summary popup
option_extra_message = Show optional extra message

## REPO: no longer supported (kept for compatibility).
[REPO]

## RPM: list RPMs to install for Linux builds.
[RPM]
# Intentionally blank for this remote functional profile.

## FILES: files copied from local resources to remote target locations over SFTP.
[FILES]
example-ini-files/samplecsvfile.txt = %remote_stage%/%customer_name%/%environment%
example-ini-files/just-an-owl-md.png = %remote_stage%/%customer_name%/%environment%
README.md = %remote_stage%/%customer_name%/%environment%/README_copy.md

## ACTIONS: commands executed on the remote Linux host over SSH.
[ACTIONS]
option_prepare_workspace = mkdir -p %remote_stage%/%customer_name%/%environment%
action_banner = echo "Starting remote test for operator=%operator_name% customer=%customer_name% env=%environment% host=%host%"
action_seed_file = sh -c 'printf "line1=alpha\nline2=beta\nsite=%site_code%\n" > %remote_stage%/%customer_name%/%environment%/config.txt'
action_log_note = sh -c 'echo "%install_note%" >> %remote_stage%/%customer_name%/%environment%/%logname%'
option_extra_message = MSGBOX::Optional message selected for %customer_name% at %site_code%

## MODIFY: update or append content in remote files.
[MODIFY]
1 = {FILE}%remote_stage%/%customer_name%/%environment%/generated.conf{ADD}customer=%customer_name%||env=%environment%
2 = {FILE}%remote_stage%/%customer_name%/%environment%/config.txt{CHANGE}line2=beta||line2=gamma
3 = {FILE}%remote_stage%/%customer_name%/%environment%/config.txt{ADD}note=%install_note%

## FINAL: commands executed on the remote host after all sections.
[FINAL]
final_remote_listing = ls -la %remote_stage%/%customer_name%/%environment%
option_show_summary = MSGBOX::Remote summary complete for %customer_name% (%environment%) on %host%

## DIAGNOSTICS: optional post-final checks. Not implemented for remote installs yet.
[DIAGNOSTICS]
# Intentionally empty for remote profile.
