## Extensive functional test profile for Tarpon Installer non-GUI mode.
## This file is intentionally non-destructive and writes test artifacts to /tmp.

## STARTUP: non-GUI behavior.
[STARTUP]
usegui = False
installtitle = Tarpon Installer Extensive Functional Test (Headless)
startupinfo = "Comprehensive end-to-end non-GUI test of files, actions, modify, and final steps"
buttontext = Run Extensive Headless Test
watchdog = False
process_timeout = 180
adminrights = False

## USERINFO: credentials used for remote installs and privileged actions.
[USERINFO]
username =
password =

## SERVERCONFIG: remote host info used for SSH or substitutions.
[SERVERCONFIG]
host =

## BUILD: platform, install type, and resource directory.
[BUILD]
buildtype = LINUX
installtype = LOCAL
resources = .

## USERINPUT: prompts shown to users (use "prompt || default" for defaults).
[USERINPUT]
operator_name = Enter operator name (e.g., kevin) || kevin
customer_name = Enter customer shortname || acme
environment = Enter environment (dev, qa, prod) || qa
site_code = Enter site code
port_value = Enter service port || 8080
app_user = Enter service account name || appuser
install_note = Enter install note || nightly run
rollback_flag = Enter rollback flag (true/false) || false

## VARIABLES: static values used as tokens in actions/files.
[VARIABLES]
stagedir = /tmp/tarpon_installer_extensive_headless
logname = extensive_test.log

## OPTIONS: optional actions enabled with --option.
[OPTIONS]
option_prepare_workspace = ALSOCHECKOPTION::option_show_summary,option_exec_python::Prepare workspace (also checks summary + python callback)
option_show_summary = Show completion summary
option_exec_python = Execute Python callback popup
option_extra_message = Show optional extra message
option_trigger_test_error = Trigger intentional test error

## REPO: no longer supported (kept for compatibility).
[REPO]

## RPM: list RPMs to install for Linux builds.
[RPM]
# Intentionally blank so this test can run on systems without RPM tooling.

## FILES: files copied from resources to target locations.
[FILES]
example-ini-files/samplecsvfile.txt = %stagedir%/%customer_name%/%environment%
example-ini-files/just-an-owl-md.png = %stagedir%/%customer_name%/%environment%
tarpon_installer.py = %stagedir%/%customer_name%/%environment%/tarpon_installer_copy.py

## ACTIONS: commands executed during install.
[ACTIONS]
action_banner = echo "Starting extensive headless test for operator=%operator_name%, customer=%customer_name%, env=%environment%"
option_prepare_workspace = mkdir -p %stagedir%/%customer_name%/%environment%
action_seed_file = sh -c 'printf "line1=alpha\nline2=beta\nport=%port_value%\n" > %stagedir%/%customer_name%/%environment%/config.txt'
action_log_note = sh -c 'printf "%install_note%\n" >> %stagedir%/%customer_name%/%environment%/%logname%'
action_yesno = YESNO::Proceed with extensive headless test actions?::echo User accepted YESNO prompt
option_extra_message = MSGBOX::Optional message selected for %customer_name% at %site_code%
option_trigger_test_error = tarpon_intentional_test_error_command
action_msgbox_variables = MSGBOX::Variables test operator=%operator_name%, site=%site_code%, rollback=%rollback_flag%
action_if_then_else_environment = [IF]%environment% == qa[THEN]MSGBOX::IFTHENELSE matched QA environment[ELSE]MSGBOX::IFTHENELSE matched non-QA environment
action_poplist_inline = POPLIST::Pick deployment role::INPUTLIST::Admin,PowerUser,Viewer,Operator::selected_role
action_poplist_file = POPLIST::Pick value from file::INPUTFILE::example-ini-files/samplecsvfile.txt::selected_file_value
action_verify_poplist_role = MSGBOX::POPLIST INPUTLIST selected: %selected_role%
action_verify_poplist_file = MSGBOX::POPLIST INPUTFILE selected: %selected_file_value%
action_ifoption_summary_echo = IFOPTION::option_show_summary::echo Summary option is enabled
action_ifgoto_stage_exists = IFGOTO::test -d %stagedir%/%customer_name%/%environment%::goto_stage_exists
action_after_ifgoto_1 = echo This line should usually be skipped when IFGOTO condition is true
action_after_ifgoto_2 = echo This line should also be skipped when IFGOTO condition is true
goto_stage_exists = MSGBOX::IFGOTO landed successfully at goto_stage_exists

## MODIFY: change or append lines in files.
[MODIFY]
1 = {FILE}%stagedir%/%customer_name%/%environment%/generated.conf{ADD}customer=%customer_name%||env=%environment%||role=%selected_role%
2 = {FILE}%stagedir%/%customer_name%/%environment%/config.txt{CHANGE}line2=beta||line2=%selected_file_value%
3 = {FILE}%stagedir%/%customer_name%/%environment%/config.txt{ADD}role=%selected_role%

## FINAL: commands executed after all other sections.
[FINAL]
option_show_summary = MSGBOX::Final summary for %customer_name% (%environment%) written under %stagedir%
option_exec_python = EXEC_PYFUNC::sample-python-scripts/reminder.py::popup_message::Tarpon extensive headless test completed for ,%customer_name%
final_echo_done = echo Extensive headless functional test complete
