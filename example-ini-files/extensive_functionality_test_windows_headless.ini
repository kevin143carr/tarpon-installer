## Extensive functional test profile for Tarpon Installer headless mode on Windows.
## This file is intentionally non-destructive and writes test artifacts to C:/temp.

## STARTUP: non-GUI behavior.
[STARTUP]
## Set to True to run the installer with the GUI, or False for headless mode.
usegui = False
## Path to the logo image shown in the installer window. Leave blank for headless mode.
logoimg =
## Optional PNG icon for the app window. Leave blank for headless mode.
iconpng =
## Optional ICO icon for the app window. Leave blank for headless mode.
iconico =
## Title text shown in the installer window.
installtitle = Tarpon Installer Extensive Functional Test (Windows Headless)
## Main descriptive text shown when the installer starts.
startupinfo = "Comprehensive Windows headless test of files, actions, modify, and final steps"
## Label used for the main button that starts the install.
buttontext = Run Extensive Windows Headless Test
## Set to True to enable the watchdog helper for local processes.
watchdog = False
## Maximum runtime in seconds for local RPM and ACTION commands. Use 0 to disable the timeout.
process_timeout = 180
## Set to True if the installer must run with admin or root privileges.
adminrights = False
## ttkbootstrap theme name used by the GUI. Kept for config completeness even in headless mode.
themename = superhero
## Set to True to show a final GUI popup with logged errors when the run ends.
displayfinalerrors = False
## Set to True to keep going after per-step errors instead of stopping the run.
continuewitherrors = False
## Set to True to run post-install diagnostics after the FINAL section.
usediagnostics = True

## USERINFO: credentials used for remote installs and privileged actions.
[USERINFO]
username =
password =

## SERVERCONFIG: remote host info used for SSH or substitutions.
[SERVERCONFIG]
host =

## BUILD: platform, install type, and resource directory.
[BUILD]
buildtype = WINDOWS
installtype = LOCAL
resources = .

## USERINPUT: prompts shown to users (use "prompt || default" for defaults).
[USERINPUT]
operator_name = Enter operator name (e.g., kevin) || kevin
customer_name = Enter customer shortname || acme
environment = Enter environment (dev, qa, prod) || qa
site_code = Enter site code
port_value = Enter service port || 8080
app_user = Enter service account name || appuser
install_note = Enter install note || nightly run
rollback_flag = Enter rollback flag (true/false) || false

## VARIABLES: static values used as tokens in actions/files.
[VARIABLES]
stagedir = C:/temp/tarpon_installer_extensive_windows_headless
logname = extensive_test.log

## OPTIONS: optional actions enabled with --option.
[OPTIONS]
## TarpL ALSOCHECKOPTION links one option to one or more other options.
## Syntax: option_key = ALSOCHECKOPTION::other_option1,other_option2::Label shown in the UI
option_prepare_workspace = ALSOCHECKOPTION::option_show_summary,option_exec_python::Prepare workspace (also checks summary + python callback)
option_show_summary = Show completion summary
option_exec_python = Execute Python callback popup
option_extra_message = Show optional extra message
option_trigger_test_error = Trigger intentional test error

## REPO: no longer supported (kept for compatibility).
[REPO]

## RPM: list RPMs to install for Linux builds.
[RPM]
# Intentionally blank for Windows test coverage.

## FILES: files copied from resources to target locations.
[FILES]
example-ini-files/samplecsvfile.txt = %stagedir%/%customer_name%/%environment%
example-ini-files/just-an-owl-md.png = %stagedir%/%customer_name%/%environment%
tarpon_installer.py = %stagedir%/%customer_name%/%environment%/tarpon_installer_copy.py

## ACTIONS: commands executed during install.
[ACTIONS]
action_banner = echo Starting extensive Windows headless test for operator=%operator_name%, customer=%customer_name%, env=%environment%
option_prepare_workspace = mkdir %stagedir%\%customer_name%\%environment%
action_seed_file = cmd /c "(echo line1=alpha&& echo line2=beta&& echo port=%port_value%) > %stagedir%\%customer_name%\%environment%\config.txt"
action_log_note = cmd /c "echo %install_note%>> %stagedir%\%customer_name%\%environment%\%logname%"
## TarpL YESNO shows a yes/no prompt and runs the command only on Yes.
## Syntax: action_key = YESNO::Prompt text::command to run on Yes
action_yesno = YESNO::Proceed with extensive Windows headless test actions?::echo User accepted YESNO prompt
## TarpL MSGBOX shows a message dialog and does not run a shell command.
## Syntax: action_key = MSGBOX::Message text
option_extra_message = MSGBOX::Optional message selected for %customer_name% at %site_code%
option_trigger_test_error = tarpon_intentional_test_error_command
action_msgbox_variables = MSGBOX::Variables test operator=%operator_name%, site=%site_code%, rollback=%rollback_flag%
## TarpL IF/THEN/ELSE evaluates a condition and returns one of two actions or messages.
## Syntax: action_key = [IF]left side == right side[THEN]result when true[ELSE]result when false
action_if_then_else_environment = [IF]%environment% == qa[THEN]MSGBOX::IFTHENELSE matched QA environment[ELSE]MSGBOX::IFTHENELSE matched non-QA environment
## TarpL POPLIST with INPUTLIST shows a pick list from inline values and stores the selected value.
## Syntax: action_key = POPLIST::Prompt text::INPUTLIST::value1,value2,value3::return_variable
action_poplist_inline = POPLIST::Pick deployment role::INPUTLIST::Admin,PowerUser,Viewer,Operator::selected_role
## TarpL POPLIST with INPUTFILE reads the pick-list values from a file and stores the selected value.
## Syntax: action_key = POPLIST::Prompt text::INPUTFILE::path/to/file.txt::return_variable
action_poplist_file = POPLIST::Pick value from file::INPUTFILE::example-ini-files/samplecsvfile.txt::selected_file_value
action_verify_poplist_role = MSGBOX::POPLIST INPUTLIST selected: %selected_role%
action_verify_poplist_file = MSGBOX::POPLIST INPUTFILE selected: %selected_file_value%
## TarpL IFOPTION runs a command only when the named option is enabled.
## Syntax: action_key = IFOPTION::option_key::command to run when enabled
action_ifoption_summary_echo = IFOPTION::option_show_summary::echo Summary option is enabled
## TarpL IFGOTO runs a command and jumps to another action label when the command returns success.
## Syntax: action_key = IFGOTO::command returning 0 or non-0::target_action_key
action_ifgoto_stage_exists = IFGOTO::IF EXIST "%stagedir%\%customer_name%\%environment%" (cmd /c exit 0) ELSE (cmd /c exit 1) & cmd /c exit %ERRORLEVEL%::goto_stage_exists
action_after_ifgoto_1 = echo This line should usually be skipped when IFGOTO condition is true
action_after_ifgoto_2 = echo This line should also be skipped when IFGOTO condition is true
goto_stage_exists = MSGBOX::IFGOTO landed successfully at goto_stage_exists

## MODIFY: change or append lines in files.
[MODIFY]
1 = {FILE}%stagedir%/%customer_name%/%environment%/generated.conf{ADD}customer=%customer_name%||env=%environment%||role=%selected_role%
2 = {FILE}%stagedir%/%customer_name%/%environment%/config.txt{CHANGE}line2=beta||line2=%selected_file_value%
3 = {FILE}%stagedir%/%customer_name%/%environment%/config.txt{ADD}role=%selected_role%

## FINAL: commands executed after all other sections.
[FINAL]
option_show_summary = MSGBOX::Final summary for %customer_name% (%environment%) written under %stagedir%
## TarpL EXEC_PYFUNC imports a Python file and calls one function with comma-separated arguments.
## Syntax: action_key = EXEC_PYFUNC::path/to/script.py::function_name::arg1,arg2,arg3
option_exec_python = EXEC_PYFUNC::sample-python-scripts\reminder.py::popup_message::Tarpon extensive Windows headless test completed for ,%customer_name%
final_echo_done = echo Extensive Windows headless functional test complete

## DIAGNOSTICS: post-install checks and follow-up actions run after FINAL.
[DIAGNOSTICS]
check_stagedir = DIAG::Checking stagedir exists::IF EXIST "%stagedir%\%customer_name%\%environment%" (cmd /c exit 0) ELSE (cmd /c exit 1)
check_config = DIAG::Checking config file exists::IF EXIST "%stagedir%\%customer_name%\%environment%\config.txt" (cmd /c exit 0) ELSE (cmd /c exit 1)
diag_banner = echo Diagnostics finished for %customer_name%
