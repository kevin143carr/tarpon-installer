name: release

on:
  workflow_dispatch:
    inputs:
      git_ref:
        description: Git ref to release
        required: true
        default: main
        type: string
      tag_name:
        description: Release tag to create, must match tarpon_installer_metadata.VERSION
        required: true
        type: string

permissions:
  contents: write

jobs:
  tests:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ inputs.git_ref }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install system deps
        run: sudo apt-get update && sudo apt-get install -y python3-tk

      - name: Install dependencies
        run: python -m pip install --upgrade pip && python -m pip install -r requirements.txt

      - name: Verify tag matches version
        env:
          EXPECTED_TAG: ${{ inputs.tag_name }}
        run: |
          python - <<'PY'
          import os
          from tarpon_installer_metadata import VERSION

          expected = f"v{VERSION}"
          actual = os.environ["EXPECTED_TAG"]
          if actual != expected:
              raise SystemExit(f"Requested tag {actual} does not match application version {expected}")
          PY

      - name: Run tests
        run: pytest -q

  build-native:
    needs: tests
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - runner: ubuntu-latest
            platform_id: linux-x86_64
            backend: nuitka
            build_mode: onefile
          - runner: windows-latest
            platform_id: windows-x86_64
            backend: pyinstaller
            build_mode: onefile
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ inputs.git_ref }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install Linux system deps
        if: runner.os == 'Linux'
        run: sudo apt-get update && sudo apt-get install -y python3-tk patchelf

      - name: Install dependencies
        run: python -m pip install --upgrade pip && python -m pip install -r requirements.txt -r requirements-build.txt

      - name: Build release zip
        run: python useful_scripts/build_nuitka_release.py --platform-id ${{ matrix.platform_id }} --backend ${{ matrix.backend }} --build-mode ${{ matrix.build_mode }}

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: release-${{ matrix.platform_id }}
          path: dist/nuitka/*.zip
          if-no-files-found: error

  build-rhel:
    needs: tests
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - container_image: registry.access.redhat.com/ubi8/python-311:latest
            platform_id: rhel8-x86_64
            backend: pyinstaller
            build_mode: onefile
          - container_image: registry.access.redhat.com/ubi9/python-311:latest
            platform_id: rhel9-x86_64
            backend: pyinstaller
            build_mode: onefile
    container:
      image: ${{ matrix.container_image }}
      options: --user 0:0
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ inputs.git_ref }}

      - name: Install RHEL build deps
        run: sh useful_scripts/install_rhel_nuitka_build_deps.sh

      - name: Install Python dependencies
        run: python -m pip install --upgrade pip && python -m pip install -r requirements.txt -r requirements-build.txt

      - name: Build release zip
        run: python useful_scripts/build_nuitka_release.py --platform-id ${{ matrix.platform_id }} --backend ${{ matrix.backend }} --build-mode ${{ matrix.build_mode }}

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: release-${{ matrix.platform_id }}
          path: dist/nuitka/*.zip
          if-no-files-found: error

  publish:
    needs:
      - build-native
      - build-rhel
    runs-on: ubuntu-latest
    steps:
      - name: Checkout release ref
        uses: actions/checkout@v4
        with:
          ref: ${{ inputs.git_ref }}
          fetch-depth: 0

      - name: Resolve release commit
        id: release_commit
        run: echo "sha=$(git rev-parse HEAD)" >> "$GITHUB_OUTPUT"

      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          path: release-artifacts
          pattern: release-*
          merge-multiple: true

      - name: Create GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release create "${{ inputs.tag_name }}" release-artifacts/*.zip \
            --target "${{ steps.release_commit.outputs.sha }}" \
            --generate-notes \
            --title "${{ inputs.tag_name }}"
