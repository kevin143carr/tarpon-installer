name: release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  tests:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install system deps
        run: sudo apt-get update && sudo apt-get install -y python3-tk

      - name: Install dependencies
        run: python -m pip install --upgrade pip && python -m pip install -r requirements.txt

      - name: Verify tag matches version
        run: |
          python - <<'PY'
          import os
          from tarpon_installer_metadata import VERSION

          expected = f"v{VERSION}"
          actual = os.environ["GITHUB_REF_NAME"]
          if actual != expected:
              raise SystemExit(f"Tag {actual} does not match application version {expected}")
          PY

      - name: Run tests
        run: pytest -q

  build:
    needs: tests
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - runner: ubuntu-latest
            platform_id: linux-x86_64
          - runner: windows-latest
            platform_id: windows-x86_64
          - runner: macos-15-intel
            platform_id: macos-x86_64
          - runner: macos-15
            platform_id: macos-arm64
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install Linux system deps
        if: runner.os == 'Linux'
        run: sudo apt-get update && sudo apt-get install -y python3-tk patchelf

      - name: Install dependencies
        run: python -m pip install --upgrade pip && python -m pip install -r requirements.txt -r requirements-build.txt

      - name: Build release zip
        run: python useful_scripts/build_nuitka_release.py --platform-id ${{ matrix.platform_id }}

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: release-${{ matrix.platform_id }}
          path: dist/nuitka/*.zip
          if-no-files-found: error

  publish:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          path: release-artifacts
          pattern: release-*
          merge-multiple: true

      - name: Publish GitHub release
        uses: softprops/action-gh-release@v2
        with:
          files: release-artifacts/*.zip
          generate_release_notes: true
          fail_on_unmatched_files: true
