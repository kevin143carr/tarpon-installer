name: build-artifacts

on:
  workflow_dispatch:
    inputs:
      git_ref:
        description: Git ref to validate and build
        required: true
        default: main
        type: string

jobs:
  tests:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ inputs.git_ref }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install system deps
        run: sudo apt-get update && sudo apt-get install -y python3-tk

      - name: Install dependencies
        run: python -m pip install --upgrade pip && python -m pip install -r requirements.txt

      - name: Run tests
        run: pytest -q

  build-native:
    needs: tests
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - runner: ubuntu-latest
            platform_id: linux-x86_64
            release_script: useful_scripts/build_nuitka_release.py
            build_mode: onefile
          - runner: windows-latest
            platform_id: windows-x86_64
            release_script: useful_scripts/build_pyinstaller_release.py
            build_mode: onefile
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ inputs.git_ref }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install Linux system deps
        if: runner.os == 'Linux'
        run: sudo apt-get update && sudo apt-get install -y python3-tk patchelf

      - name: Install dependencies
        run: python -m pip install --upgrade pip && python -m pip install -r requirements.txt -r requirements-build.txt

      - name: Build release zip
        run: python ${{ matrix.release_script }} --platform-id ${{ matrix.platform_id }} --build-mode ${{ matrix.build_mode }}

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: build-${{ matrix.platform_id }}
          path: dist/nuitka/*.zip
          if-no-files-found: error

  build-rhel:
    needs: tests
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - container_image: registry.access.redhat.com/ubi8/python-311:latest
            platform_id: rhel8-x86_64
            release_script: useful_scripts/build_pyinstaller_release.py
            build_mode: onefile
          - container_image: registry.access.redhat.com/ubi9/python-311:latest
            platform_id: rhel9-x86_64
            release_script: useful_scripts/build_pyinstaller_release.py
            build_mode: onefile
    container:
      image: ${{ matrix.container_image }}
      options: --user 0:0
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ inputs.git_ref }}

      - name: Install RHEL build deps
        run: sh useful_scripts/install_rhel_nuitka_build_deps.sh

      - name: Install Python dependencies
        run: python -m pip install --upgrade pip && python -m pip install -r requirements.txt -r requirements-build.txt

      - name: Build release zip
        run: python ${{ matrix.release_script }} --platform-id ${{ matrix.platform_id }} --build-mode ${{ matrix.build_mode }}

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: build-${{ matrix.platform_id }}
          path: dist/nuitka/*.zip
          if-no-files-found: error
